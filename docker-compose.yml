services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://user:password@vector_db:5432/shopify_support
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - vector_db
      - redis
    volumes:
      - ./app:/app/app
      - ./faq:/app/faq

  vector_db:
    image: ankane/pgvector
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=shopify_support
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
